name: Deploy E-commerce App

on:
   workflow_dispatch: 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install & Build Full App
        run: |
          cd mern-ecommerce
          npm install
          npm run build

      # Deploy Backend
      - name: Deploy Backend
        uses: azure/webapps-deploy@v2
        with:
          app-name: ecommerce-backend-27-04
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: .
      
      - name: Debug frontend output
        run: ls -R frontend

      # Deploy Frontend (build output)
      - name: Deploy Frontend
        uses: azure/webapps-deploy@v2
        with:
          app-name: ecommerce-frontend-27-04
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: ./frontend/build
