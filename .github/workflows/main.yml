name: Deploy E-commerce App

on:
  push:
    branches:
      - main
  workflow_dispatch:  

jobs:
  backend:
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Backend
        run: |
          cd mern-ecommerce/backend
          npm install

      - name: Deploy Backend
        uses: azure/webapps-deploy@v2
        with:
          app-name: ecommerce-backend-27-04
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: mern-ecommerce/backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Build Frontend
        run: |
          cd mern-ecommerce/frontend
          npm install
          npm run build

      - name: Deploy Frontend
        uses: azure/webapps-deploy@v2
        with:
          app-name: ecommerce-frontend-27-04
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: mern-ecommerce/frontend/build
